<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        .register-container {
            max-width: 400px;
            margin: 50px auto;
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .register-form h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .error-message {
            background-color: #ffdddd;
            border-left: 4px solid #ff4d4d;
            padding: 12px 15px;
            border-radius: 6px;
            color: #a30000;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .register-form label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        .register-form input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .register-form input:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 5px rgba(26,26,26,0.3);
            outline: none;
        }

        .register-form button {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .register-form button:hover {
            background-color: #333;
        }

        .telegram-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px 20px;
            background-color: #0088cc;
            color: #fff;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .telegram-btn svg {
            width: 22px;
            height: 22px;
        }

        .telegram-btn:hover {
            background-color: #0077b5;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .social-icon {
            color: #fff;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            opacity: 0.8;
        }

        .fa-telegram:hover {
            color: #0088cc;
        }

        .fa-twitter:hover {
            color: #1da1f2;
        }

        .fa-linkedin:hover {
            color: #0077b5;
        }

    </style>
</head>
<body>
    <div class="register-container">
        <form class="register-form" method="POST" action="/register_submit">
            <div class="error-message">
                Passwords do not match. Please enter matching passwords.
            </div>

            <h2>Create Account</h2>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>

            <button type="submit">Register</button>

            <a class="telegram-btn" href="https://t.me/crypto_vazima" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
                    <circle cx="120" cy="120" r="120" fill="#0088cc"/>
                    <path d="M185 70L159 178c-2 8-7 10-14 6l-40-30-19 18c-2 2-4 3-7 3l3-42 76-69c3-3-1-4-5-2l-94 59L37 111c-8-3-8-8 2-12l137-53c6-2 11 1 9 8z" fill="#fff"/>
                </svg>
                Contact Support
            </a>

            <div class="login-link">
                <a href="/login">Already have an account?</a>
            </div>

        </form>
    </div>
    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Web3 Career Board. All rights reserved.</p>
                <div class="social-links">
                    <a href="https://t.me/crypto_vazima" target="_blank" class="social-icon">
                        <i class="fab fa-telegram"></i>
                    </a>
                    <a href="https://x.com/crypto_vazima" target="_blank" class="social-icon">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://linkedin.com/in/vazima" target="_blank" class="social-icon">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
